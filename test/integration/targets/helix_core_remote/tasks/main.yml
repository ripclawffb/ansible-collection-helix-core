# Check mode tests
- name: Create remote in check mode
  ripclawffb.helix_core.helix_core_remote:
    state: present
    remoteid: check-remote
    description: 'Check mode test remote.'
    address: 'ssl:central-perforce:1666'
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: check_create_remote
  check_mode: true

- name: Verify check mode create
  ansible.builtin.assert:
    that:
      - check_create_remote is changed

- name: Verify remote was not actually created
  ripclawffb.helix_core.helix_core_remote:
    state: absent
    remoteid: check-remote
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: check_create_verify

- name: Verify check_create_verify is not changed (meaning it never existed)
  ansible.builtin.assert:
    that:
      - check_create_verify is not changed

- name: Create remote for check mode update tests
  ripclawffb.helix_core.helix_core_remote:
    state: present
    remoteid: check-remote-update
    description: 'Initial description.'
    server: '1666'
    user: bruno
    charset: auto
    password: ''

- name: Update remote in check mode
  ripclawffb.helix_core.helix_core_remote:
    state: present
    remoteid: check-remote-update
    description: 'Updated description.'
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: check_update_remote
  check_mode: true

- name: Verify check mode update
  ansible.builtin.assert:
    that:
      - check_update_remote is changed

- name: Delete remote in check mode
  ripclawffb.helix_core.helix_core_remote:
    state: absent
    remoteid: check-remote-update
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: check_delete_remote
  check_mode: true

- name: Verify check mode delete
  ansible.builtin.assert:
    that:
      - check_delete_remote is changed

- name: Cleanup check mode test remote
  ripclawffb.helix_core.helix_core_remote:
    state: absent
    remoteid: check-remote-update
    server: '1666'
    user: bruno
    charset: auto
    password: ''

# Diff mode tests
- name: Create remote with diff mode
  ripclawffb.helix_core.helix_core_remote:
    state: present
    remoteid: diff-remote
    description: 'Diff test remote.'
    address: 'ssl:central-perforce:1666'
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: diff_create_remote
  diff: true

- name: Verify diff output on remote create
  ansible.builtin.assert:
    that:
      - diff_create_remote is changed
      - diff_create_remote.diff is defined
      - diff_create_remote.diff.before is defined
      - diff_create_remote.diff.after is defined
      - diff_create_remote.diff.before == ''
      - "'Diff test remote.' in diff_create_remote.diff.after"

- name: Update remote with diff mode
  ripclawffb.helix_core.helix_core_remote:
    state: present
    remoteid: diff-remote
    description: 'Diff test remote updated.'
    address: 'ssl:central-perforce:1666'
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: diff_update_remote
  diff: true

- name: Verify diff output on remote update
  ansible.builtin.assert:
    that:
      - diff_update_remote is changed
      - diff_update_remote.diff is defined
      - "'Diff test remote.' in diff_update_remote.diff.before"
      - "'Diff test remote updated.' in diff_update_remote.diff.after"

- name: Delete remote with diff mode
  ripclawffb.helix_core.helix_core_remote:
    state: absent
    remoteid: diff-remote
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: diff_delete_remote
  diff: true

- name: Verify diff output on remote delete
  ansible.builtin.assert:
    that:
      - diff_delete_remote is changed
      - diff_delete_remote.diff is defined
      - "'Diff test remote updated.' in diff_delete_remote.diff.before"
      - diff_delete_remote.diff.after == ''
