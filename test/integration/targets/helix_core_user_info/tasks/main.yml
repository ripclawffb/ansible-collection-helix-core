---
# List all users
- name: List all users
  ripclawffb.helix_core.helix_core_user_info:
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: all_users

- name: Verify all_users returns a list
  ansible.builtin.assert:
    that:
      - all_users.info is defined
      - all_users.info | type_debug == 'list'
      - all_users.info | length > 0
      - all_users is not changed

# Get specific user (bruno always exists)
- name: Get specific user info
  ripclawffb.helix_core.helix_core_user_info:
    name: bruno
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: user_info

- name: Verify user_info returns a dict
  ansible.builtin.assert:
    that:
      - user_info.info is defined
      - user_info.info | type_debug == 'dict'
      - user_info.info.Email is defined
      - user_info is not changed
