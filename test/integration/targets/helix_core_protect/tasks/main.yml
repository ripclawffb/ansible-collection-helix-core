# ===== Position parameter tests =====
# Set up a known 5-entry base table for position testing
# Expected table after this:
#   [0] super  user  bruno         *  //...
#   [1] write  group developers    *  //depot/dev/...
#   [2] read   group qa_team       *  //depot/qa/...
#   [3] list   group interns       *  //depot/docs/...
#   [4] read   group contractors   *  //depot/shared/...
- name: Set up base table for position tests
  ripclawffb.helix_core.helix_core_protect:
    state: present
    mode: replace
    protections:
      - access: super
        type: user
        name: bruno
        host: "*"
        path: //...
      - access: write
        type: group
        name: developers
        host: "*"
        path: //depot/dev/...
      - access: read
        type: group
        name: qa_team
        host: "*"
        path: //depot/qa/...
      - access: list
        type: group
        name: interns
        host: "*"
        path: //depot/docs/...
      - access: read
        type: group
        name: contractors
        host: "*"
        path: //depot/shared/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: setup_base_table

- name: Get base table
  ripclawffb.helix_core.helix_core_protect_info:
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: base_table_info

- name: Verify base table has 5 entries
  ansible.builtin.assert:
    that:
      - "(base_table_info.protections | length) == 5"
      - "base_table_info.protections[0].name == 'bruno'"
      - "base_table_info.protections[1].name == 'developers'"
      - "base_table_info.protections[2].name == 'qa_team'"
      - "base_table_info.protections[3].name == 'interns'"
      - "base_table_info.protections[4].name == 'contractors'"

# Test position=beginning: insert at index 0
# Expected: [security_team, bruno, developers, qa_team, interns, contractors]
- name: Add entry at beginning of 5-entry table
  ripclawffb.helix_core.helix_core_protect:
    state: present
    position: beginning
    protections:
      - access: admin
        type: group
        name: security_team
        host: "*"
        path: //...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: pos_beginning

- name: Get protections after beginning insert
  ripclawffb.helix_core.helix_core_protect_info:
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: info_after_beginning

- name: Verify beginning insert placed entry at index 0
  ansible.builtin.assert:
    that:
      - pos_beginning is changed
      - "(info_after_beginning.protections | length) == 6"
      - "info_after_beginning.protections[0].name == 'security_team'"
      - "info_after_beginning.protections[1].name == 'bruno'"
      - "info_after_beginning.protections[5].name == 'contractors'"

- name: Add entry at beginning (idempotent)
  ripclawffb.helix_core.helix_core_protect:
    state: present
    position: beginning
    protections:
      - access: admin
        type: group
        name: security_team
        host: "*"
        path: //...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: pos_beginning_idempotent

- name: Verify beginning insert is idempotent
  ansible.builtin.assert:
    that:
      - pos_beginning_idempotent is not changed

# Test position=end: append after last entry
