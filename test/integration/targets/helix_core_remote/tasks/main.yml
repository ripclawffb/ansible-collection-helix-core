---
- name: Create a new remote spec
  ripclawffb.helix_core.helix_core_remote:
    state: present
    remoteid: test-remote
    description: 'Created by root for testing.'
    address: 'ssl:central-perforce:1666'
    depotmap:
      - '//depot/... //depot/...'
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: create_remote_spec

- name: Output create_remote_spec
  ansible.builtin.debug:
    var: create_remote_spec

- name: Verify create_remote_spec is changed
  ansible.builtin.assert:
    that:
      - create_remote_spec is changed
      - create_remote_spec.remote_spec.RemoteID == 'test-remote'

