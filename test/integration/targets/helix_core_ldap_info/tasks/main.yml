---
# List all LDAP configs (may be empty if no LDAP is configured)
- name: List all LDAP configs
  ripclawffb.helix_core.helix_core_ldap_info:
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: all_ldaps

- name: Output all_ldaps
  ansible.builtin.debug:
    var: all_ldaps

- name: Verify all_ldaps returns a list
  ansible.builtin.assert:
    that:
      - all_ldaps.info is defined
      - all_ldaps.info | type_debug == 'list'
      - all_ldaps is not changed
