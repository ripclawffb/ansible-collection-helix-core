        path: //depot/...
      - access: read
        type: user
        name: order_test_b
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: cleanup

- name: Output cleanup
  ansible.builtin.debug:
    var: cleanup

# Verify test entries truly removed via _info module
- name: Get protection table after cleanup
  ripclawffb.helix_core.helix_core_protect_info:
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: protect_info_after_cleanup

- name: Verify test entries no longer exist on server
  ansible.builtin.assert:
    that:
      - "(protect_info_after_cleanup.protections | selectattr('name', 'equalto', 'test_writers') | list | length) == 0"
      - "(protect_info_after_cleanup.protections | selectattr('name', 'equalto', 'test_admin') | list | length) == 0"
      - "(protect_info_after_cleanup.protections | selectattr('name', 'equalto', 'order_test_a') | list | length) == 0"
      - "(protect_info_after_cleanup.protections | selectattr('name', 'equalto', 'order_test_b') | list | length) == 0"
      - "(protect_info_after_cleanup.protections | selectattr('name', 'equalto', 'test_dup') | list | length) == 0"

# Diff mode tests
- name: Add protection entry with diff mode
  ripclawffb.helix_core.helix_core_protect:
    state: present
    protections:
      - access: list
        type: user
        name: diff_test_user
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: diff_add_protect
  diff: true

- name: Output diff_add_protect
  ansible.builtin.debug:
    var: diff_add_protect

- name: Verify diff output on protect add
  ansible.builtin.assert:
    that:
      - diff_add_protect is changed
      - diff_add_protect.diff is defined
      - diff_add_protect.diff.before is defined
      - diff_add_protect.diff.after is defined
      - "'diff_test_user' in diff_add_protect.diff.after"

- name: Add protection entry with diff mode (idempotent)
  ripclawffb.helix_core.helix_core_protect:
    state: present
    protections:
      - access: list
        type: user
        name: diff_test_user
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: diff_add_protect_idempotent
  diff: true

- name: Verify no diff on idempotent protect run
  ansible.builtin.assert:
    that:
      - diff_add_protect_idempotent is not changed
      - diff_add_protect_idempotent.diff is not defined

- name: Remove protection entry with diff mode
  ripclawffb.helix_core.helix_core_protect:
    state: absent
    protections:
      - access: list
        type: user
        name: diff_test_user
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: diff_remove_protect
  diff: true

- name: Output diff_remove_protect
  ansible.builtin.debug:
    var: diff_remove_protect

- name: Verify diff output on protect remove
  ansible.builtin.assert:
    that:
      - diff_remove_protect is changed
      - diff_remove_protect.diff is defined
      - "'diff_test_user' in diff_remove_protect.diff.before"
      - "'diff_test_user' not in diff_remove_protect.diff.after"

