# Test replace mode enforces order
- name: Set table with replace mode (A then B)
  ripclawffb.helix_core.helix_core_protect:
    state: present
    mode: replace
    protections:
      - access: super
        type: user
        name: bruno
        host: "*"
        path: //...
      - access: write
        type: user
        name: order_test_a
        host: "*"
        path: //depot/...
      - access: read
        type: user
        name: order_test_b
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: replace_order_ab

- name: Verify replace_order_ab is changed
  ansible.builtin.assert:
    that:
      - replace_order_ab is changed

- name: Replace table with swapped order (B then A)
  ripclawffb.helix_core.helix_core_protect:
    state: present
    mode: replace
    protections:
      - access: super
        type: user
        name: bruno
        host: "*"
        path: //...
      - access: read
        type: user
        name: order_test_b
        host: "*"
        path: //depot/...
      - access: write
        type: user
        name: order_test_a
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: replace_order_ba

- name: Verify replace detects reorder as changed
  ansible.builtin.assert:
    that:
      - replace_order_ba is changed

- name: Replace table with same order (B then A, idempotent)
  ripclawffb.helix_core.helix_core_protect:
    state: present
    mode: replace
    protections:
      - access: super
        type: user
        name: bruno
        host: "*"
        path: //...
      - access: read
        type: user
        name: order_test_b
        host: "*"
        path: //depot/...
      - access: write
        type: user
        name: order_test_a
        host: "*"
        path: //depot/...
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: replace_order_ba_idempotent

- name: Verify replace with same order is idempotent
  ansible.builtin.assert:
    that:
      - replace_order_ba_idempotent is not changed

# Test security block - should fail
- name: Attempt to clear protection table (should fail)
  ripclawffb.helix_core.helix_core_protect:
    state: absent
    mode: replace
    server: '1666'
    user: bruno
    charset: auto
    password: ''
  register: clear_table
  ignore_errors: true

- name: Output clear_table
  ansible.builtin.debug:
    var: clear_table

- name: Verify clear_table failed with security message
  ansible.builtin.assert:
    that:
      - clear_table.failed | bool
      - "'not allowed' in clear_table.msg"

